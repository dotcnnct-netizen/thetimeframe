[build]
  publish = "public"
  functions = "netlify/functions"

# functions self-declare their paths via `export const config`, but these
# rewrites keep clean /api/* URLs working as a fallback too.
[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

[[redirects]]
  from = "/api/ingest"
  to = "/.netlify/functions/ingest"
  status = 200
